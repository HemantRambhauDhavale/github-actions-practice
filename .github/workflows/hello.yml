name: My First Workflow

on: push

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print Hello
        run: echo "Hello from GitHub Actions!"

      - name: Show Date
        run: date

      - name: Show Branch Name
        run: echo ${{ github.ref_name }}

      - name: List Files
        run: ls -la

      - name: Show OS
        run: uname -a
