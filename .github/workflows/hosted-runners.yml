name: Hosted Runners Test

on: push

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running on Ubuntu"
      - run: uname -a
      - run: whoami
      - run: hostname

  windows-job:
    runs-on: windows-latest
    steps:
      - run: echo "Running on Windows"
      - run: hostname

  mac-job:
    runs-on: macos-latest
    steps:
      - run: echo "Running on macOS"
      - run: hostname
