name: Env Vars Demo

on: push

env:
  APP_NAME: myapp

jobs:
  demo:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: staging

    steps:
      - name: Print Values
        env:
          VERSION: 1.0.0
        run: |
          echo "App=$APP_NAME"
          echo "Env=$ENVIRONMENT"
          echo "Version=$VERSION"
          echo "Actor=${{ github.actor }}"
          echo "SHA=${{ github.sha }}"
